services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - fleet-net

  fleet-server:
    build: ./fleet-server
    container_name: fleet-server
    ports:
      - "8000:8000"
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - DATABASE_URL=sqlite:///./fleet.db
    depends_on:
      - mosquitto
    networks:
      - fleet-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_THEME: ${VITE_THEME:-blue}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - fleet-server
    networks:
      - fleet-net

  device-simulator:
    build: ./device-simulator
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
    depends_on:
      - mosquitto
    networks:
      - fleet-net

networks:
  fleet-net:
    driver: bridge
