services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - fleet-net

  fleet-server:
    build: ./fleet-server
    container_name: fleet-server
    ports:
      - "8000:8000"
    environment:
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=1883
      - DATABASE_URL=sqlite:///./fleet.db
      - UPDATE_PACKAGES_DIR=/app/packages
      - SERVER_BASE_URL=${SERVER_BASE_URL:-http://localhost:8000}
    volumes:
      - update_packages:/app/packages
    depends_on:
      - mosquitto
    networks:
      - fleet-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_THEME: ${VITE_THEME:-blue}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - fleet-server
    networks:
      - fleet-net

  device-simulator:
    build:
      context: .
      dockerfile: ./device-simulator/Dockerfile
    environment:
      - MQTT_BROKER=${MQTT_BROKER}
      - RUST_LOG=info
      - MQTT_PORT=1883
      - DEVICE_VERSION=0.0.0
      - UPDATE_BASE_DIR=/tmp/fleet-app
      - UPDATE_FAILURE_RATE=0.1
    depends_on:
      - mosquitto
    networks:
      - fleet-net

networks:
  fleet-net:
    driver: bridge

volumes:
  update_packages:
